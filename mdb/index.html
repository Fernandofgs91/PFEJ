<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes Populares - TMDB</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- CABEÇALHO 100% LARGURA -->
    <header>
        <div class="header-content">
            <h1><i class="fas fa-film"></i> Filmes Populares</h1>
            <p>Os 10 filmes mais populares do momento</p>

            <!-- FILTRO POR GÊNERO -->
            <div class="filter-container">
                <label for="genre-filter">Filtrar:</label>
                <select id="genre-filter" class="genre-select">
                    <option value="all">Todos os gêneros</option>
                </select>
            </div>

        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container">
        <main>
            <div class="movies-grid" id="movies-grid"></div>

            <!-- PAGINAÇÃO -->
            <div class="pagination" id="pagination">
                <button class="pagination-btn" id="prev-page" disabled>
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <span class="page-info" id="page-info">Página 1 de 1</span>
                <button class="pagination-btn" id="next-page">
                    Próxima <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- RODAPÉ 100% LARGURA -->
    <footer>
        <div class="footer-content">
            <p>Dados fornecidos por <a href="https://www.themoviedb.org/" target="_blank">TMDB</a></p>
            <div class="api-credit">
                <i class="fas fa-film"></i>
                <span>Filmes Populares © 2026</span>
            </div>
        </div>
    </footer>

    <!-- LOADING -->
    <div class="loading-spinner" id="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
    </div>

    <script src="js/tmdbAPI.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
